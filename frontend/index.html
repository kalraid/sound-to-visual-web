<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sound-to-visual-web</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: #0b0d12; color: #e8eaf0;
        font-family: system-ui, "Segoe UI", sans-serif; overflow: hidden; }
      #app { display: flex; flex-direction: column; height: 100vh; }

      #toolbar { display: flex; gap: 12px; align-items: center; padding: 8px 12px;
        background: #11141c; border-bottom: 1px solid #222838; flex-wrap: wrap; }
      #toolbar label { font-size: 13px; color: #aab; }
      #category { font-weight: 700; padding: 2px 10px; border-radius: 6px;
        background: #1d2740; }
      select, input[type="range"], button { background: #1a1f2b; color: #e8eaf0;
        border: 1px solid #2a3142; border-radius: 6px; padding: 5px 8px; font-size: 13px; }
      button { cursor: pointer; }
      button:hover { background: #232a3a; }
      #status { font-size: 12px; color: #8892a6; margin-left: auto; }

      /* 상단 악보 패널 (ADR 0009): 한 줄(시스템)만 크게, 페이지 넘김 */
      #score-panel { height: 32vh; min-height: 180px; background: #fafafa;
        overflow: hidden; border-bottom: 1px solid #222838; position: relative; }
      #osmd { width: 100%; }
      #pianoroll { display: block; width: 100%; height: 100%; }

      /* 하단 3D (ADR 0003) */
      #stage { flex: 1; position: relative; }
      #stage canvas { display: block; }

      #transport { display: flex; gap: 10px; align-items: center; padding: 6px 12px;
        background: #11141c; border-top: 1px solid #222838; }
      #seek { flex: 1; }
      #time { font-variant-numeric: tabular-nums; font-size: 12px; color: #aab; min-width: 90px; }

      #drop-hint { position: absolute; inset: 0; display: flex; align-items: center;
        justify-content: center; pointer-events: none; color: #4a5570; font-size: 18px; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <button id="open-btn">파일 열기 (.mid/.musicxml)</button>
        <input id="file-input" type="file" accept=".mid,.midi,.xml,.musicxml,.mxl" hidden />
        <span>분류:</span>
        <select id="category-select" title="자동 분류 결과 — 오판 시 수동 변경(ADR 0005)">
          <option value="canon">캐논</option>
          <option value="harmonic">화음</option>
          <option value="other">기타</option>
        </select>
        <span id="category-conf">-</span>
        <label>최대 성부 <span id="voice-count">4</span>
          <input id="voice-slider" type="range" min="1" max="8" value="4" />
        </label>
        <label>카메라
          <select id="camera-select">
            <option value="overhead" selected>3/4 부감</option>
            <option value="chase">추격</option>
            <option value="side">측면</option>
          </select>
        </label>
        <label>시점
          <select id="camdir-select">
            <option value="right" selected>우(앞)</option>
            <option value="left">좌(뒤)</option>
          </select>
        </label>
        <label>배경
          <select id="bg-select">
            <option value="grid" selected>그라데이션+그리드</option>
            <option value="space">우주/별</option>
            <option value="solid">단색</option>
          </select>
        </label>
        <label>비트반응
          <select id="beat-select">
            <option value="drum" selected>드럼/강박</option>
            <option value="all">모든 음</option>
            <option value="none">없음</option>
          </select>
        </label>
        <label>지형
          <select id="shape-select">
            <option value="smooth" selected>능선(기존)</option>
            <option value="stepped">블록</option>
          </select>
        </label>
        <label>렌더
          <select id="style-select">
            <option value="glow" selected>발광(기존)</option>
            <option value="matte">무광</option>
          </select>
        </label>
        <label>트랙
          <select id="track-select">
            <option value="wide" selected>넓게(기존)</option>
            <option value="narrow">좁게</option>
          </select>
        </label>
        <label>무대
          <select id="stage-select">
            <option value="scroll" selected>스크롤(기존)</option>
            <option value="diorama">디오라마</option>
          </select>
        </label>
        <label>추격강조
          <select id="canon-select">
            <option value="on" selected>켜기(캐논)</option>
            <option value="off">끄기</option>
          </select>
        </label>
        <label>거울대칭
          <select id="mirror-select">
            <option value="on" selected>켜기(역행/전위)</option>
            <option value="off">끄기</option>
          </select>
        </label>
        <label>악보
          <select id="score-select">
            <option value="osmd" selected>오선보(기존)</option>
            <option value="pianoroll">피아노롤</option>
          </select>
        </label>
        <label>악보크기 <span id="score-zoom-val">1.1</span>
          <input id="score-zoom" type="range" min="0.3" max="2.0" step="0.1" value="1.1" />
        </label>
        <span id="status">파일을 열어 시작하세요</span>
      </div>

      <div id="score-panel"><div id="osmd"></div><canvas id="pianoroll" style="display:none"></canvas></div>

      <div id="stage">
        <div id="drop-hint">여기에 MIDI / MusicXML 파일을 끌어다 놓으세요</div>
      </div>

      <div id="transport">
        <button id="play-btn">▶︎ 재생</button>
        <input id="seek" type="range" min="0" max="1000" value="0" />
        <span id="time">0:00 / 0:00</span>
        <label>배속
          <select id="rate-select">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
          </select>
        </label>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
